name: Deploy to Toolforge

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node to build Vue
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Build the Frontend
      - name: Build Vue App
        run: |
          echo "Building Frontend..."
          cd frontend  
          npm install
          npm run build
          echo "Frontend Built!"

      # 4. Setup SSH Agent 
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TOOLFORGE_SSH_KEY }}

      - name: Add Known Hosts
        run: ssh-keyscan login.toolforge.org >> ~/.ssh/known_hosts

      # 5. Deploy (SCP + SSH)
      - name: Deploy to Toolforge
        env:
          SSH_USER: ${{ secrets.TOOLFORGE_USER }}
          TOOL_NAME: ${{ secrets.TOOL_NAME }}
          HOST: login.toolforge.org
          DEST_STATIC: "/data/project/${{ secrets.TOOL_NAME }}/www/python/static"
          BACKEND_DIR: "/data/project/${{ secrets.TOOL_NAME }}/www/python/src"
        run: |
          echo "Starting Deployment to $TOOL_NAME..."
        
          echo "Uploading built assets..."
          scp -r frontend/dist $SSH_USER@$HOST:/home/$SSH_USER/tmp_vue_build
      
          echo "🔧 Connecting to server to finish update..."
          ssh $SSH_USER@$HOST <<EOF
            set -e
      
            # Switch to tool user
            become $TOOL_NAME <<'TOOL_EOF'
              set -e
      
              echo "⬇️ Updating backend..."
              cd $BACKEND_DIR
              git pull origin main
      
              echo "📦 Updating static files..."
              mkdir -p $DEST_STATIC
              rsync -av --delete /home/$SSH_USER/tmp_vue_build/dist/ $DEST_STATIC/
      
              echo "🔄 Restarting webservice..."
              webservice python3.13 restart
            TOOL_EOF
      
            # Cleanup SSH user home
            rm -rf /home/$SSH_USER/tmp_vue_build
            echo "Deploy complete!"
          EOF
